<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodNStuff</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FoodNStuff</h1>
    <a href="./">Mahlzeiten</a>
  </header>

  <main>
    <div class="filter-bar" id="filter-bar">
      <button class="active" data-cat="all">Alle</button>
<button data-cat="lunch">Full Meal</button>
      <button data-cat="snacks">Snacks</button>
      <button data-cat="prep">Prep</button>
    </div>

    <div id="meal-grid">
      <p class="status-msg">Lade Mahlzeiten…</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="js/content-index.js"></script>
  <script src="js/meals.js"></script>
</body>
</html>
