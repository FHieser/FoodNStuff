name: Jackfruit-Tomaten-Pfanne mit Toast
description: Würzige Jackfruit-Pfanne mit Tomatenmark, Sojasauce und Petersilie. Auf Toast serviert — schnell, pflanzlich, sättigend.
ingredients:
  - name: Jackfrucht (jung, aus der Dose)
    bls_code: F549100
    amount_g: 150
  - name: Tomate
    bls_code: G561100
    amount_g: 100
  - name: Tomatenmark
    bls_code: R160000
    amount_g: 20
  - name: Sojasauce
    bls_code: R143000
    amount_g: 10
  - name: Olivenöl
    bls_code: Q120000
    amount_g: 8
  - name: Zitronensaft
    bls_code: F601600
    amount_g: 10
  - name: Petersilie frisch
    bls_code: G250100
    amount_g: 10
  - name: Weizentoastbrot (2 Scheiben)
    bls_code: B314000
    amount_g: 60
  - name: Salz, Pfeffer, Knoblauchpulver
    amount_g: 2
steps:
  - Jackfrucht abtropfen lassen, gut ausdrücken und mit den Händen oder einer Gabel in Fasern zerteilen (Pulled-Optik).
  - Tomate in grobe Würfel schneiden. Petersilie grob hacken.
  - Olivenöl in einer Pfanne bei mittlerer bis hoher Hitze erhitzen. Jackfrucht zugeben und 3–4 Minuten anbraten bis sie etwas Farbe bekommt.
  - Tomatenmark zugeben und 1–2 Minuten unter Rühren anschwitzen.
  - Tomatenwürfel, Sojasauce und Zitronensaft zugeben. Mit Salz, Pfeffer und Knoblauchpulver würzen. Alles 3–4 Minuten bei mittlerer Hitze köcheln lassen bis die Sauce leicht eindickt.
  - Toast toasten. Jackfruit-Mischung auf den Toast geben und mit Petersilie bestreuen.
notes: |
  Junge Jackfrucht aus der Dose (z.B. von EDEKA, Rewe oder Asia-Läden) verwenden — nicht die süße reife Variante.
  Wer mehr Schärfe mag: eine Prise Chiliflocken oder etwas Harissa mit in die Pfanne.
  Für Meal Prep die Jackfruit-Pfanne vorkochen und gekühlt lagern, Toast immer frisch toasten.
